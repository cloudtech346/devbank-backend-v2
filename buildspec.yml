version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 872352220406.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - echo Build started on `date`
      - docker build -t devbank-backend .
      - docker tag devbank-backend:latest 872352220406.dkr.ecr.us-east-1.amazonaws.com/devbank-backend:latest
  post_build:
    commands:
      - echo Build completed on `date`
      - docker push 872352220406.dkr.ecr.us-east-1.amazonaws.com/devbank-backend:latest
