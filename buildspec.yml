version: 0.2
phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin <account_id>.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  build:
    commands:
      - docker build -t devbank-backend .
      - docker tag devbank-backend:latest <account_id>.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/devbank-backend:latest
  post_build:
    commands:
      - docker push <account_id>.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/devbank-backend:latest
