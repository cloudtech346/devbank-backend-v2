version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to DockerHub
      - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

  build:
    commands:
      - docker build -t cloudtech346/devbank-backend-v2:latest .

  post_build:
    commands:
      - docker push cloudtech346/devbank-backend-v2:latest
